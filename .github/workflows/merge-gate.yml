name: Merge gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: merge-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  quality-gates:
    name: "${{ matrix.gate }}"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        gate: [build, lint, test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opensprint
          POSTGRES_PASSWORD: opensprint
          POSTGRES_DB: opensprint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "sh -c \"PGPASSWORD=$POSTGRES_PASSWORD psql -U $POSTGRES_USER -d $POSTGRES_DB -c 'SELECT 1' || exit 1\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify desktop artifact names (fixed for permalinks)
        if: matrix.gate == 'build'
        run: npm run verify:desktop-artifacts
      - name: Run gate
        if: matrix.gate != 'test'
        run: npm run ${{ matrix.gate }}
      - name: Run test gate with machine-readable reports
        if: matrix.gate == 'test'
        run: |
          mkdir -p artifacts/test-results

          for workspace in shared backend frontend; do
            npm run test -w packages/$workspace -- \
              --reporter=default \
              --reporter=junit \
              --reporter=json \
              --outputFile.junit=../../artifacts/test-results/$workspace-junit.xml \
              --outputFile.json=../../artifacts/test-results/$workspace-results.json
          done
      - name: Upload test reports
        if: always() && matrix.gate == 'test'
        uses: actions/upload-artifact@v6
        with:
          name: merge-gate-test-reports-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: artifacts/test-results/
          if-no-files-found: warn
          retention-days: 14
